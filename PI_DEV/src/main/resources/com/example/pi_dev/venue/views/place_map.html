<!DOCTYPE html>
<html>
<head>
    <title>Venue Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Critical CSS Inlined to ensure immediate layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden;
            background-color: #f8f9fa;
            /* Disable user selection to prevent interference with clicks */
            user-select: none;
            -webkit-user-select: none;
        }
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
            /* Ensure it captures all pointer events */
            pointer-events: auto !important;
        }
        /* Inline Leaflet Positioning Fixes */
        .leaflet-pane, .leaflet-tile, .leaflet-marker-icon, .leaflet-marker-shadow, .leaflet-tile-container, .leaflet-pane > svg, .leaflet-pane > canvas, .leaflet-zoom-box, .leaflet-image-layer, .leaflet-layer {
            position: absolute;
            left: 0;
            top: 0;
        }
        .leaflet-tile {
            filter: inherit;
            visibility: hidden;
        }
        .leaflet-tile-loaded {
            visibility: inherit;
        }
        .leaflet-container img {
            max-width: none !important;
            max-height: none !important;
        }
        .leaflet-container .leaflet-tile-pane img {
            max-width: none !important;
            max-height: none !important;
            position: absolute;
        }
        #debug-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
    
    <!-- Custom Design CSS (Non-critical styling) -->
    <link rel="stylesheet" href="map.css" />
    <!-- Leaflet JS -->
    <script>
        // CRITICAL FIX FOR JAVAFX WEBVIEW
        window.L_DISABLE_3D = true;
        window.L_NO_TOUCH = true;
    </script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="debug-overlay">
        Map Status: <span id="status-text">Initializing...</span><br>
        Size: <span id="size-text">0x0</span><br>
        Tiles: <span id="tile-text">Not Loaded</span>
    </div>
    <div id="map"></div>

    <script>
        var map;
        var currentMarker;
        var markersGroup;
        var initAttempted = false;

        function updateDebug(status, size, tiles) {
            if (status) document.getElementById('status-text').innerText = status;
            if (size) document.getElementById('size-text').innerText = size;
            if (tiles) document.getElementById('tile-text').innerText = tiles;
            console.log("[MAP DEBUG] " + status + " | " + size + " | " + tiles);
        }

        function initMap(lat, lon, zoom) {
            var container = document.getElementById('map');
            if (!container) {
                updateDebug("Error: No container", null, null);
                return;
            }

            var currentSize = container.clientWidth + "x" + container.clientHeight;
            updateDebug("Checking size...", currentSize, null);

            // If map already exists, just update view
            if (map) {
                lat = lat || 36.8065;
                lon = lon || 10.1815;
                zoom = zoom || 13;
                map.setView([lat, lon], zoom);
                forceRefresh();
                updateDebug("Updated view", currentSize, null);
                return;
            }

            if (initAttempted) return;

            // Strict check: Only initialize if container has physical size
            if (container.clientWidth <= 0 || container.clientHeight <= 0) {
                updateDebug("Waiting for size...", currentSize, null);
                setTimeout(function() { initMap(lat, lon, zoom); }, 200);
                return;
            }

            initAttempted = true;
            updateDebug("Initializing Leaflet...", currentSize, null);

            lat = lat || 36.8065;
            lon = lon || 10.1815;
            zoom = zoom || 13;

            try {
                map = L.map('map', {
                    zoomControl: true,
                    attributionControl: false,
                    fadeAnimation: false,
                    zoomAnimation: false,
                    markerZoomAnimation: false,
                    inertia: false,
                    transform3DLimit: 0,
                    tap: false // CRITICAL: Disable Leaflet tap handling for JavaFX WebView
                }).setView([lat, lon], zoom);

                var tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18,
                    noWrap: true
                }).addTo(map);

                tiles.on('tileload', function() {
                    updateDebug(null, null, "Loading...");
                });
                tiles.on('load', function() {
                    updateDebug("Ready", null, "Loaded");
                });
                tiles.on('tileerror', function(e) {
                    updateDebug("Tile Error", null, "Failed");
                    console.error("Tile error:", e);
                });

                markersGroup = L.layerGroup().addTo(map);
                
                map.on('click', function(e) {
                    console.log("[MAP] Clicked at: " + e.latlng.lat + ", " + e.latlng.lng);
                    if (window.javaApp) {
                        window.javaApp.updateCoordinates(e.latlng.lat, e.latlng.lng);
                    } else {
                        console.warn("[MAP] javaApp not found in window");
                    }
                });

                // Add direct listener to the map container as a fallback
                container.addEventListener('mousedown', function(e) {
                    console.log("[MAP CONTAINER] mousedown detected");
                });
                container.addEventListener('click', function(e) {
                    console.log("[MAP CONTAINER] click detected");
                });

                // Proactive refresh on move/zoom to ensure tiles don't disappear in WebView
                map.on('moveend', function() {
                    console.log("[MAP] Move ended");
                    forceRefresh();
                });
                map.on('zoomend', function() {
                    console.log("[MAP] Zoom ended");
                    forceRefresh();
                });

                window.onresize = function() {
                    if (map) {
                        map.invalidateSize();
                        updateDebug(null, container.clientWidth + "x" + container.clientHeight, null);
                    }
                };

                var delays = [100, 500, 1000, 2000];
                for (var i = 0; i < delays.length; i++) {
                    setTimeout(forceRefresh, delays[i]);
                }
                
                updateDebug("Map Created", currentSize, "Waiting...");
            } catch (e) {
                updateDebug("JS Error: " + e.message, null, null);
                console.error(e);
            }
        }

        function forceRefresh() {
            if (map) {
                map.invalidateSize({ animate: false });
                // Aggressive fix: Trigger a simulated resize event
                window.dispatchEvent(new Event('resize'));
            }
        }

        function createCustomIcon() {
            return L.divIcon({
                className: 'custom-div-icon',
                html: '<div class="marker-pin"></div>',
                iconSize: [32, 42],
                iconAnchor: [16, 42],
                popupAnchor: [0, -40]
            });
        }

        function addMarker(lat, lon, title, clearOthers, location) {
            if (!map) return;
            
            if (clearOthers) {
                if (currentMarker) map.removeLayer(currentMarker);
                markersGroup.clearLayers();
            }

            var icon = createCustomIcon();
            var marker = L.marker([lat, lon], { icon: icon });
            
            if (title) {
                var popupContent = '<div class="popup-container">' +
                                  '<span class="popup-title">' + title + '</span>' +
                                  (location ? '<span class="popup-location">' + location + '</span>' : '') +
                                  '</div>';
                marker.bindPopup(popupContent);
            }
            
            if (clearOthers) {
                currentMarker = marker.addTo(map);
            } else {
                marker.addTo(markersGroup);
            }
            
            return marker;
        }

        function clearMarkers() {
            if (markersGroup) markersGroup.clearLayers();
            if (currentMarker) map.removeLayer(currentMarker);
        }

        function setView(lat, lon, zoom) {
            if (map) map.setView([lat, lon], zoom);
        }

        // Initialize with default view
        window.onload = function() {
            initMap();
        };
    </script>
</body>
</html>
